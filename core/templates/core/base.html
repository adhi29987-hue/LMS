{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Library Management System</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div id="header">
    <div id="logo">NATIONAL COLLEGE LMS</div>
    <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active-link{% endif %}">Dashboard</a>
    <a href="{% url 'books_list' %}" class="nav-link {% if 'book' in request.resolver_match.url_name %}active-link{% endif %}">Books</a>
    <a href="{% url 'students_list' %}" class="nav-link {% if 'student' in request.resolver_match.url_name %}active-link{% endif %}">Students</a>
    <a href="{% url 'issue_book' %}" class="nav-link {% if request.resolver_match.url_name == 'issue_book' %}active-link{% endif %}">Issue Books</a>
    <a href="{% url 'attendance_list' %}" class="nav-link {% if 'attendance' in request.resolver_match.url_name %}active-link{% endif %}">Attendance</a>
    <a href="{% url 'reports' %}" class="nav-link {% if request.resolver_match.url_name == 'reports' %}active-link{% endif %}">Reports</a>
    <form method="POST" action="{% url 'logout' %}" style="display:inline;margin:0;">{% csrf_token %}<button type="submit" class="nav-link" style="color:#ef4444;background:none;border:none;cursor:pointer;font-size:15px;padding:8px 16px;">Logout</button></form>
    <div id="profile-pic">{{ request.user.username|first|upper }}</div>
</div>

<div id="main-container">
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="msg msg-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="{% static 'script.js' %}"></script>
</body>
</html>
