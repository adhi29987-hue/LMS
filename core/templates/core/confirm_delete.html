{% extends 'core/base.html' %}
{% block content %}
<div class="form-card">
    <h2>Confirm Delete</h2>
    <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
    <p style="color:#ef4444;">This action cannot be undone.</p>
    <form method="POST">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn-delete-confirm">Yes, Delete</button>
            <a href="javascript:history.back()"><button type="button" class="btn-outline">Cancel</button></a>
        </div>
    </form>
</div>
{% endblock %}
